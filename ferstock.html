<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="src/web/favicon.ico" type="image/x-icon" />
  <title>Samuel Barbosa | Ferstock — Em Breve</title>
  <meta name="author" content="Samuel Barbosa de Oliveira" />
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- Icons -->
  <script src="https://kit.fontawesome.com/407a013642.js" crossorigin="anonymous"></script>
  <!-- CSS -->
  <link rel="stylesheet" href="src/css/reset.css" />
  <link rel="stylesheet" href="src/css/main.css" />
</head>
<body>

  <!-- HEADER -->
  <header id="header">
    <div class="header-inner">
      <a href="/index.html" class="logo-link">S<span class="accent">.</span>B</a>
      <nav class="main-nav">
        <a href="/index.html#sobre" class="nav-link">Sobre</a>
        <a href="/index.html#projetos" class="nav-link">Projetos</a>
      </nav>
      <div class="header-actions">
        <a href="/index.html" class="btn-contato">← Portfólio</a>
      </div>
    </div>
  </header>

  <main>
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 60px;">

      <div style="position:relative;margin-bottom:32px;">
        <div style="font-size:5rem;color:var(--accent);opacity:0.15;font-weight:900;letter-spacing:-0.05em;line-height:1;">
          FERSTOCK
        </div>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
          <div style="width:64px;height:64px;border:2px solid var(--border-accent);border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg-card);">
            <i class="fas fa-clock" style="font-size:1.6rem;color:var(--accent);"></i>
          </div>
        </div>
      </div>

      <div class="badge-available" style="margin:0 auto 24px;">
        <span class="badge-dot"></span>
        <span>Em produção — em breve</span>
      </div>

      <h1 style="font-size:clamp(2rem,5vw,3rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:16px;">
        Projeto <span class="gradient-text">Ferstock</span>
      </h1>

      <p style="font-size:1rem;color:var(--text-muted);max-width:480px;line-height:1.7;margin-bottom:40px;">
        Este projeto está quase pronto. Em breve você poderá acompanhá-lo aqui. Fique de olho no progresso!
      </p>

      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
        <a href="/index.html" class="btn-primary">
          <i class="fas fa-arrow-left"></i> Voltar ao Portfólio
        </a>
        <a href="https://github.com/SamuelBarbosa1" target="_blank" class="btn-outline">
          <i class="fab fa-github"></i> GitHub
        </a>
      </div>
    </div>
  </main>

  <button id="backToTop" class="back-to-top" aria-label="Voltar ao topo"><i class="fas fa-arrow-up"></i></button>

  <script>
    // Simple scroll listener
    const header = document.getElementById('header');
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('show', window.scrollY > 300);
    });
    backToTop.addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));
  </script>
</body>
</html>
